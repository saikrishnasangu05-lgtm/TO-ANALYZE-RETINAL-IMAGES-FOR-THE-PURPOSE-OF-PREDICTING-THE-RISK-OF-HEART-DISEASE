{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">

<h3 class="mb-3">Dataset Images</h3>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Image Name</th>
<th>Class</th>
</tr>

</thead>

<tbody>

{% for row in data %}

<tr>
<td>{{loop.index}}</td>
<td>{{row.image}}</td>
<td>{{row.class}}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
